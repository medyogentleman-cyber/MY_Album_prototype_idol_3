<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="inv_title">ファン招待 - MYアルバム アーティスト</title>
    <link rel="stylesheet" href="styles.css">
    <script src="lang.js"></script>
    <style>
        .qr-card { background: white; padding: 40px 24px; border-radius: 24px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-top: 20px; }
        .qr-frame {
            width: 220px; height: 220px; background: #fff; margin: 0 auto 24px;
            padding: 12px; border: 1px solid var(--border-color); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .qr-placeholder {
            width: 100%; height: 100%;
            background: repeating-conic-gradient(#000 0% 25%, #FFF 0% 50%) 50% / 20px 20px;
            opacity: 0.1;
        }
        .qr-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 8px; border-radius: 8px; font-weight: 900; color: var(--primary-color); border: 1px solid var(--border-color); }
        .url-display { background: #f2f2f7; padding: 14px; border-radius: 12px; font-family: monospace; font-size: 13px; color: var(--text-main); margin-bottom: 20px; word-break: break-all; text-align: left; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button class="btn-ghost" onclick="history.back()" style="font-size: 20px;">←</button>
            <h1 class="header-title" data-i18n="inv_header">キュレーター招待</h1>
            <div style="width: 32px;"></div>
        </header>

        <main class="p-4 anim-fade" style="padding-bottom: 110px;">
            <div class="qr-card">
                <div class="qr-frame">
                    <div class="qr-placeholder"></div>
                    <div class="qr-logo">MY</div>
                </div>
                <h3 class="mb-2" data-i18n="inv_hub_name">蒼くみ 公式HUB招待</h3>
                <p class="text-xs text-sub mb-6" data-i18n="inv_scan_desc">このQRコードをスキャンして公認登録</p>
                
                <div class="url-display">
                    https://myalbum.app/invite/aoi-kumi-official
                </div>

                <div class="flex gap-4">
                    <button class="btn btn-secondary" onclick="saveQR()" data-i18n="inv_btn_save">画像を保存</button>
                    <button class="btn btn-primary" onclick="copyInviteLink()" data-i18n="inv_btn_copy">URLをコピー</button>
                </div>
            </div>

            <div style="text-align: center; margin-top: 40px;">
                <p class="text-sub text-xs" data-i18n="inv_note">※公認キュレーターは、あなたのオリジナル素材を<br>使用して二次創作コンテンツを作成できます。</p>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span data-i18n="nav_home">ホーム</span>
            </a>
            <a href="album_edit.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span data-i18n="nav_post">MY投稿</span>
            </a>
            <a href="review.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <span data-i18n="nav_review">レビュー</span>
            </a>
            <a href="invite.html" class="nav-item active">
                <svg viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span data-i18n="nav_invite">招待</span>
            </a>
            <a href="mypage.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span data-i18n="nav_mypage">マイページ</span>
            </a>
        </nav>
    </div>
    <script>
        function saveQR() {
            if (typeof showToast === 'function') {
                showToast(typeof t === 'function' ? t('inv_msg_save') : 'QR画像を保存しました');
            } else {
                alert(typeof t === 'function' ? t('inv_msg_save') : 'QR画像を保存しました');
            }
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
