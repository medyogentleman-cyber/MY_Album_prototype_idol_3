<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>販売設定 - MYアルバム アーティスト</title>
    <link rel="stylesheet" href="styles.css">
    <script src="lang.js"></script>
    <style>
        .setting-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.03); }
        .sc-title { font-size: 15px; font-weight: 950; margin-bottom: 16px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .sc-title::before { content: ''; display: block; width: 4px; height: 16px; background: var(--primary-color); border-radius: 2px; }

        .target-goods { display: flex; gap: 16px; align-items: center; background: #F8F9FB; padding: 12px; border-radius: 16px; border: 1px dashed rgba(0,0,0,0.1); margin-bottom: 24px; }
        .tg-thumb { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; }
        .tg-info { flex: 1; }
        .tg-title { font-size: 14px; font-weight: 950; margin-bottom: 4px; }
        .tg-meta { font-size: 11px; font-weight: 800; color: var(--text-sub); }

        .price-simulator { background: #F2F2F7; padding: 16px; border-radius: 12px; margin-top: 12px; }
        .ps-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; color: var(--text-sub); margin-bottom: 8px; }
        .ps-row.profit { font-size: 15px; font-weight: 950; color: #FF3366; margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(0,0,0,0.1); }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .toggle-label { font-size: 14px; font-weight: 900; }
        
        /* Base Form input styling adjusted for dark text */
        input[type="date"], input[type="time"], input[type="number"] { width: 100%; border: 1px solid #E5E5EA; background: #FFF; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 800; font-family: inherit; color: var(--text-main); box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--primary-color); }
        
        .datetime-group { display: flex; gap: 8px; margin-bottom: 16px; }
        .datetime-group > div { flex: 1; }

        .btn-confirm { width: 100%; padding: 16px; border-radius: 16px; font-size: 15px; font-weight: 950; background: linear-gradient(135deg, var(--primary-color), var(--primary-light)); color: white; border: none; box-shadow: 0 8px 20px rgba(255,107,0,0.2); transition: 0.2s; cursor: pointer; }
        .btn-confirm:active { transform: scale(0.97); }

        .helper-text { font-size: 11px; font-weight: 800; color: var(--text-sub); margin-top: 4px; }
        
        .toast-success { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 24px; font-size: 13px; font-weight: 800; z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,0.2); opacity: 0; visibility: hidden; transition: 0.3s; }
        .toast-success.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button class="btn-ghost" onclick="history.back()" style="font-size: 20px;">←</button>
            <h1 class="header-title">ファン向け販売設定</h1>
            <div style="width: 32px;"></div>
        </header>

        <main class="p-4 anim-fade" style="padding-bottom: 110px;">
            
            <div class="target-goods">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" class="tg-thumb" id="item-thumb">
                <div class="tg-info">
                    <div class="tg-title" id="item-title">2026 Spring Tour Tシャツ (Black)</div>
                    <div class="tg-meta" id="item-meta">現在の在庫数: 150 / 原価: ¥1,500</div>
                </div>
            </div>

            <div class="setting-card">
                <h2 class="sc-title">販売価格設定</h2>
                <div style="position: relative;">
                    <span style="position: absolute; left: 16px; top: 14px; font-size: 15px; font-weight: 900; color: var(--text-main);">¥</span>
                    <input type="number" id="input-price" value="3500" style="padding-left: 36px;" oninput="calculateProfit()">
                </div>
                <div class="helper-text">※ファンが購入する税込価格を入力してください</div>

                <div class="price-simulator">
                    <div class="ps-row"><span>販売価格</span><span id="sim-price">¥3,500</span></div>
                    <div class="ps-row"><span>原価</span><span id="sim-cost">- ¥1,500</span></div>
                    <div class="ps-row"><span>プラットフォーム手数料 (10%)</span><span id="sim-fee">- ¥350</span></div>
                    <div class="ps-row profit"><span>想定利益 (1個あたり)</span><span id="sim-profit">¥1,650</span></div>
                </div>
            </div>

            <div class="setting-card">
                <h2 class="sc-title">販売スケジュールの設定</h2>
                <div class="mb-4">
                    <label style="font-size: 12px; font-weight: 800; color: var(--text-sub); display: block; margin-bottom: 4px;">販売開始</label>
                    <div class="datetime-group">
                        <input type="date" value="2026-05-01">
                        <input type="time" value="12:00">
                    </div>
                </div>
                <div>
                    <div class="toggle-row">
                        <span class="toggle-label">販売終了日時を設定する</span>
                        <label class="toggle-switch"><input type="checkbox" id="toggle-end" onchange="toggleEndTime()"><span class="slider"></span></label>
                    </div>
                    <div id="end-time-wrapper" style="display: none;">
                        <div class="datetime-group">
                            <input type="date">
                            <input type="time">
                        </div>
                    </div>
                </div>
            </div>

            <div class="setting-card">
                <h2 class="sc-title">販売数量・在庫の制限</h2>
                <div class="toggle-row">
                    <span class="toggle-label">販売数量を限定する</span>
                    <label class="toggle-switch"><input type="checkbox" id="toggle-qty" checked onchange="toggleQtyInput()"><span class="slider"></span></label>
                </div>
                <div id="qty-wrapper" style="margin-bottom: 16px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="number" value="150" style="width: 100px; text-align: right;">
                        <span style="font-size: 14px; font-weight: 900;">個</span>
                    </div>
                    <div class="helper-text">※設定した数に達すると自動的に「Sold Out」になります。</div>
                </div>

                <div style="border-top: 1px solid rgba(0,0,0,0.05); margin: 16px 0;"></div>

                <div class="toggle-row">
                    <span class="toggle-label">1人あたりの購入制限</span>
                    <label class="toggle-switch"><input type="checkbox" id="toggle-limit" onchange="toggleLimitInput()"><span class="slider"></span></label>
                </div>
                <div id="limit-wrapper" style="display: none;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="number" value="3" style="width: 100px; text-align: right;">
                        <span style="font-size: 14px; font-weight: 900;">個まで</span>
                    </div>
                </div>
            </div>

            <button class="btn-confirm" onclick="saveSettings()">設定を保存して販売予約する</button>

        </main>

        <div id="toast" class="toast-success">✨ 販売設定を保存しました</div>
    </div>

    <script>
        const COST = 1500;
        const FEE_RATE = 0.1;

        function calculateProfit() {
            const priceInput = document.getElementById('input-price').value;
            const price = parseInt(priceInput, 10);
            
            if (isNaN(price) || price < COST) {
                document.getElementById('sim-price').innerText = "¥0";
                document.getElementById('sim-fee').innerText = "- ¥0";
                document.getElementById('sim-profit').innerText = "¥0";
                return;
            }

            const fee = Math.floor(price * FEE_RATE);
            const profit = price - COST - fee;

            document.getElementById('sim-price').innerText = "¥" + price.toLocaleString();
            document.getElementById('sim-fee').innerText = "- ¥" + fee.toLocaleString();
            document.getElementById('sim-profit').innerText = "¥" + profit.toLocaleString();
            
            const profitEl = document.getElementById('sim-profit');
            if (profit > 0) {
                profitEl.style.color = "#FF3366";
            } else {
                profitEl.style.color = "var(--text-sub)";
            }
        }

        function toggleEndTime() {
            const isChecked = document.getElementById('toggle-end').checked;
            document.getElementById('end-time-wrapper').style.display = isChecked ? 'block' : 'none';
        }

        function toggleQtyInput() {
            const isChecked = document.getElementById('toggle-qty').checked;
            document.getElementById('qty-wrapper').style.display = isChecked ? 'block' : 'none';
        }

        function toggleLimitInput() {
            const isChecked = document.getElementById('toggle-limit').checked;
            document.getElementById('limit-wrapper').style.display = isChecked ? 'block' : 'none';
        }

        function saveSettings() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    location.href = 'goods_history.html';
                }, 300);
            }, 1500);
        }

        // Initialize display
        calculateProfit();
    </script>
</body>
</html>
